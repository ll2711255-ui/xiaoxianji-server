# ============================================================
# 小鲜鸡 Nginx 配置（HTTPS + HTTP 重定向）
# 证书：Let's Encrypt ECDSA，自动续期
# ============================================================

# ===== HTTP → HTTPS 重定向 =====
server {
    listen       80;
    server_name  www.xuaioxianji.top xuaioxianji.top;

    # Let's Encrypt ACME 验证路径不走重定向
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其他所有请求跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===== HTTPS 主站 =====
server {
    listen       443 ssl;
    http2        on;
    server_name  www.xuaioxianji.top xuaioxianji.top;

    # SSL 证书
    ssl_certificate     /etc/letsencrypt/live/www.xuaioxianji.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.xuaioxianji.top/privkey.pem;

    # SSL 安全配置（Mozilla Intermediate）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 公钥固定（可选，证书变更时需更新）
    # add_header Public-Key-Pins '...';

    # HSTS（强制 HTTPS，建议确认稳定后再取消注释）
    # add_header Strict-Transport-Security "max-age=63072000" always;

    root /www/wwwroot/xiaoxianji-admin;

    access_log /var/log/nginx/xiaoxianji-access.log;
    error_log  /var/log/nginx/xiaoxianji-error.log;

    # ===== 上传文件（静态资源） =====
    location /uploads/ {
        alias /www/wwwroot/xiaoxianji-server/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ===== API 代理 =====
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # ===== PC 商家端 SPA（根路径） =====
    location / {
        root /www/wwwroot/xiaoxianji-admin;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
