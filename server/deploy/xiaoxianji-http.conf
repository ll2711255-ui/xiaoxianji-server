# ==========================================
# ⚠️ 已废弃 — 请使用 nginx-xiaoxianji.conf
# ==========================================
# 此文件仅保留作参考，不再使用。
# 正式配置以 nginx-xiaoxianji.conf 为准：
#   - HTTP 80 全部重定向到 HTTPS 443
#   - 支付回调统一走 HTTPS，不再开 HTTP 直通
# ==========================================
# 原内容：
server {
    listen 80;
    server_name www.xuaioxianji.top xuaioxianji.top 159.75.0.194;

    access_log /var/log/nginx/xiaoxianji-access.log;
    error_log  /var/log/nginx/xiaoxianji-error.log;

    location /uploads/ {
        alias /www/wwwroot/xiaoxianji-server/uploads/;
        expires 30d;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        client_max_body_size 10m;
    }

    # ===== PC 商家管理后台（SPA） =====
    location /admin/ {
        alias /www/wwwroot/xiaoxianji-admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        return 200 '小鲜鸡 API Server OK';
        add_header Content-Type text/plain;
    }
}
