# ==========================================
# 小鲜鸡 Nginx 反向代理配置
# 服务器: 腾讯云 4C4G, 159.75.0.194
# 域名: www.xuaioxianji.top
# ==========================================

# HTTP → HTTPS 重定向（所有请求统一走 HTTPS）
server {
    listen       80;
    server_name  www.xuaioxianji.top xuaioxianji.top;

    # 全部请求重定向到 HTTPS（支付回调也走 HTTPS 443）
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen       443 ssl http2;
    server_name  www.xuaioxianji.top xuaioxianji.top;

    # ========== SSL 证书（宝塔已申请的 Let's Encrypt） ==========
    ssl_certificate     /etc/nginx/ssl/xuaioxianji.top.pem;
    ssl_certificate_key /etc/nginx/ssl/xuaioxianji.top.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ========== 安全响应头 ==========
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # ========== 日志 ==========
    access_log /var/log/nginx/xiaoxianji-access.log;
    error_log  /var/log/nginx/xiaoxianji-error.log;

    # ========== 静态资源（如上传的图片） ==========
    location /uploads/ {
        alias /www/wwwroot/xiaoxianji-server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========== API 反向代理 ==========
    location /api/ {
        proxy_pass http://127.0.0.1:3000;

        # 头信息转发
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 微信支付回调需要保留原始请求体用于签名验证
        proxy_pass_request_body on;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 缓冲设置
        proxy_buffering off;
        client_max_body_size 10m;
    }

    # ========== 前端静态文件（小程序不直接访问，预留 PC 端管理后台） ==========
    location /admin/ {
        alias /www/wwwroot/xiaoxianji-admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # ========== 根路径 ==========
    location / {
        return 200 '小鲜鸡 API Server OK';
        add_header Content-Type text/plain;
    }
}
